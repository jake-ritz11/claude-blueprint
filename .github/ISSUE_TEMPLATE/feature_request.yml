name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: dropdown
    id: command
    attributes:
      label: Which command does this relate to?
      options:
        - /blueprint
        - /research
        - /plan
        - /execute-plan
        - /iterate-plan
        - /validate-plan
        - _plans-config
        - New command
        - Repo/docs
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: What problem does this solve or what workflow does it improve?
    validations:
      required: true
