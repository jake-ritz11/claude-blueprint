name: Bug Report
description: Report a problem with a Blueprint command
labels: ["bug"]
body:
  - type: dropdown
    id: command
    attributes:
      label: Command affected
      options:
        - /blueprint
        - /research
        - /plan
        - /execute-plan
        - /iterate-plan
        - /validate-plan
        - _plans-config
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem you encountered.
      placeholder: The command did X when I expected Y...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe what you expected to happen instead.
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      placeholder: e.g., 1.0.12
    validations:
      required: false
  - type: dropdown
    id: model
    attributes:
      label: Model used
      options:
        - Opus
        - Sonnet
        - Other
    validations:
      required: false
